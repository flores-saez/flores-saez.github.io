<!DOCTYPE html>
<html lang="en">
<head>

<title>Digital Technology Use and Community Identification Among Young Adults — Alonso Flores-Sáez</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ink: #0a0a0a; --mid: #6b6b6b; --light: #d8d6d0;
  --white: #ffffff; --blue: #1a1aff;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}
html { scroll-behavior: smooth; background: #ffffff; }
body { background: transparent; color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; cursor: none; }
a, button { cursor: none !important; }
#cur { position: fixed; z-index: 9999; width: 10px; height: 10px; background: var(--blue); border-radius: 50%; pointer-events: none; transform: translate(-50%,-50%); transition: width .4s var(--ease), height .4s var(--ease); }
#cur.big { width: 60px; height: 60px; opacity: 0.35; }
nav { position: fixed; inset: 0 0 auto 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 28px 56px; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); }
.nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: .88rem; letter-spacing: .1em; text-transform: uppercase; color: var(--blue); text-decoration: none; }
.nav-back { font-size: .75rem; letter-spacing: .08em; text-transform: uppercase; color: var(--mid); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: color .3s; }
.nav-back:hover { color: var(--blue); }
.nav-back svg { transition: transform .3s var(--ease); }
.nav-back:hover svg { transform: translateX(-4px); }
.hero { min-height: 52vh; padding: 0 56px 52px; display: flex; flex-direction: column; justify-content: flex-end; position: relative; overflow: hidden; }
.hero-bg { position: absolute; right: -1vw; bottom: -5vw; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 30vw; line-height: 1; color: transparent; -webkit-text-stroke: 1px rgba(26,26,255,0.15); pointer-events: none; user-select: none; letter-spacing: -.05em; }
.hero-tag { font-size: .78rem; letter-spacing: .18em; text-transform: uppercase; color: var(--mid); margin-bottom: 20px; animation: slideUp .9s .15s var(--ease) both; }
.hero-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(1.8rem, 3.5vw, 4rem); line-height: 1.05; letter-spacing: .04em; text-transform: uppercase; overflow: hidden; }
.hero-title span { display: block; animation: slideUp 1.1s .08s var(--ease) both; }
@keyframes slideUp { from { transform: translateY(108%); } to { transform: translateY(0); } }
.placeholder { padding: 120px 56px 80px; max-width: 760px; }
.placeholder-label { font-size: .7rem; letter-spacing: .22em; text-transform: uppercase; color: var(--mid); display: flex; align-items: center; gap: 14px; margin-bottom: 48px; }
.placeholder-label::before { content:''; width: 28px; height: 1px; background: var(--mid); flex-shrink: 0; }
.placeholder-msg { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.6rem; line-height: 1.3; letter-spacing: -.02em; color: var(--ink); margin-bottom: 24px; }
.placeholder-sub { font-size: .97rem; line-height: 1.85; color: var(--mid); }
.placeholder-dot { display: inline-block; width: 8px; height: 8px; background: var(--blue); border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
footer { border-top: 1px solid rgba(26,26,255,.12); padding: 26px 56px; display: flex; justify-content: space-between; align-items: center; }
.f-copy { font-size: .73rem; color: rgba(26,26,255,.35); }
.f-back { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .73rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(26,26,255,.35); text-decoration: none; transition: color .25s; }
.f-back:hover { color: var(--blue); }
</style>
</head>
<body>
<div id="cur"></div>
<nav>
  <a href="index.html" class="nav-logo">Alonso Flores-Sáez</a>
  <a href="work.html" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
    Back
  </a>
</nav>
<section class="hero">
  <div class="hero-bg" aria-hidden="true">AFS</div>
  <div class="hero-tag">UC Irvine &nbsp;·&nbsp; 2022–2023</div>
  <h1 class="hero-title"><span>Digital Technology Use and Community Identification Among Young Adults</span></h1>
</section>
<div class="placeholder">
  <div class="placeholder-label">Research</div>
  <p class="placeholder-msg"><span class="placeholder-dot"></span>Coming soon</p>
  <p class="placeholder-sub">This page is being prepared. Check back soon for the full research write-up, methodology, and findings.</p>
</div>
<footer>
  <span class="f-copy">© 2026 Alonso Flores-Sáez</span>
  <a href="work.html" class="f-back">← Back to work</a>
</footer>
<script>
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => { cur.style.left = e.clientX+'px'; cur.style.top = e.clientY+'px'; });
document.querySelectorAll('a').forEach(el => {
  el.addEventListener('mouseenter', () => cur.classList.add('big'));
  el.addEventListener('mouseleave', () => cur.classList.remove('big'));
});
</script>
</body>
</html>
